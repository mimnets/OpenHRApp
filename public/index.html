
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>OpenHRApp - Open Source HR Management System | Free HRMS Software</title>

  <!-- SEO Meta Tags -->
  <meta name="description" content="OpenHRApp is a free, open-source HR management system for organizations. Features include attendance tracking, leave management, employee directory, and local compliance tools.">
  <meta name="keywords" content="HRMS, HR management system, open source HRMS, free HR software, attendance tracking, leave management, employee management, HR tools">
  <meta name="author" content="OpenHRApp">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://openhrapp.com/">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://openhrapp.com/">
  <meta property="og:title" content="OpenHRApp - Open Source HR Management System">
  <meta property="og:description" content="Free, open-source HR management system with attendance tracking, leave management, employee directory, and compliance tools for modern organizations.">
  <meta property="og:image" content="https://openhrapp.com/img/screenshot-wide.png">
  <meta property="og:site_name" content="OpenHRApp">
  <meta property="og:locale" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="OpenHRApp - Open Source HR Management System">

  <!-- PWA & iOS Specific Meta Tags -->
  <meta name="theme-color" content="#fcfdfe">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="OpenHR">
  
  <!-- High Quality Icons for iOS -->
  <link rel="apple-touch-icon" href="./img/logo.png">
  <link rel="apple-touch-icon" sizes="152x152" href="./img/logo.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./img/logo.png">
  <link rel="apple-touch-icon" sizes="167x167" href="./img/logo.png">
  
  <link rel="icon" type="image/png" href="./img/mobile-logo.png">
  <!-- Vital: Link to manifest at the root level -->
  <link rel="manifest" href="./manifest.json">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: 'var(--primary)',
            'primary-hover': 'var(--primary-hover)',
            'primary-light': 'var(--primary-light)',
          },
          animation: {
            'slide-up': 'slideUp 0.3s ease-out',
          },
          keyframes: {
            slideUp: {
              '0%': { transform: 'translateY(10px)', opacity: 0 },
              '100%': { transform: 'translateY(0)', opacity: 1 },
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://esm.sh" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Default Theme (Indigo) */
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-light: #e0e7ff;
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background-color: #fcfdfe;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: env(safe-area-inset-bottom);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* Ensure the app feels like a real app on iOS notch devices */
    @media all and (display-mode: standalone) {
      body {
        padding-top: env(safe-area-inset-top);
      }
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .brand-gradient {
      background: linear-gradient(135deg, var(--primary) 0%, #f59e0b 50%, #10b981 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.460.0",
    "recharts": "https://esm.sh/recharts@2.13.3",
    "pocketbase": "https://esm.sh/pocketbase@0.25.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "firebase/": "https://esm.sh/firebase@^12.7.0/"
  }
}
</script>
<link rel="modulepreload" href="https://esm.sh/react@19.0.0">
<link rel="modulepreload" href="https://esm.sh/react-dom@19.0.0/client">
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-[#fcfdfe] text-slate-900">
  <div id="root">
    <!-- Splash screen shown while JS modules load -->
    <div id="app-loader" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;background:#fcfdfe;">
      <div style="width:80px;height:80px;background:var(--primary);border-radius:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 30px rgba(79,70,229,0.15);border:3px solid #fff;">
        <img src="./img/logo.webp" alt="Loading" style="width:52px;height:52px;object-fit:contain;" onerror="this.style.display='none'">
      </div>
      <div style="text-align:center;">
        <div style="font-family:'Inter',sans-serif;font-size:24px;font-weight:900;letter-spacing:-0.5px;">
          <span style="color:var(--primary);">Open</span><span style="color:#f59e0b;">HR</span><span style="color:#10b981;">App</span>
        </div>
        <p style="color:#94a3b8;font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:3px;margin-top:6px;">Loading</p>
      </div>
      <div style="width:120px;height:3px;background:#e2e8f0;border-radius:3px;overflow:hidden;">
        <div style="width:40%;height:100%;background:var(--primary);border-radius:3px;animation:loader 1.2s ease-in-out infinite;"></div>
      </div>
      <style>@keyframes loader{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}</style>
    </div>
  </div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
