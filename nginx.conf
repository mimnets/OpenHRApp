# ============================================================
# OpenHR — Nginx Configuration for Docker
# Serves the built React SPA with proper caching and fallback.
# Mirrors the Vercel rewrite rule in vercel.json.
# ============================================================

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for text-based assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Service worker and workbox files — never cache
    location ~* ^/(sw\.js|registerSW\.js|workbox-.*\.js)$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    # Content-hashed assets — cache aggressively (Vite adds content hashes)
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Images and fonts — moderate cache
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Static files that should not be cached
    location ~* ^/(manifest\.json|robots\.txt|sitemap\.xml|feed\.xml)$ {
        expires -1;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA fallback — all other routes serve index.html
    # This mirrors the vercel.json rewrite:
    # { "source": "/((?!assets/|...).*)", "destination": "/index.html" }
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
